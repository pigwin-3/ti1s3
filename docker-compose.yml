services:
  ti1s3:
    build: .
    container_name: ti1s3
    restart: unless-stopped
    ports:
      - "${HEALTH_PORT:-8080}:8080"
    environment:
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-20}
      RETENTION_HOURS: ${RETENTION_HOURS:-168}
      USED_RETENTION_HOURS: ${USED_RETENTION_HOURS:-24}
      USED_FILES_CACHE_SECONDS: ${USED_FILES_CACHE_SECONDS:-300}
      ENTUR_REQUESTOR_ID: ${ENTUR_REQUESTOR_ID:-}
      ENTUR_BASE_URL: ${ENTUR_BASE_URL:-https://api.entur.io/realtime/v1/rest/et}
      ENTUR_MODE: ${ENTUR_MODE:-poll}
      ENTUR_SUBSCRIBE_ENABLED: ${ENTUR_SUBSCRIBE_ENABLED:-false}
      ENTUR_SUBSCRIBE_URL: ${ENTUR_SUBSCRIBE_URL:-https://api.entur.io/realtime/v1/subscribe}
      ENTUR_SUBSCRIBE_CONSUMER_ADDRESS: ${ENTUR_SUBSCRIBE_CONSUMER_ADDRESS:-http://85.194.137.222:${HEALTH_PORT:-8080}/entur/subscription}
      ENTUR_SUBSCRIBE_CALLBACK_PATH: ${ENTUR_SUBSCRIBE_CALLBACK_PATH:-/entur/subscription}
      ENTUR_SUBSCRIBE_HEARTBEAT_SECONDS: ${ENTUR_SUBSCRIBE_HEARTBEAT_SECONDS:-60}
      ENTUR_SUBSCRIBE_INITIAL_TERMINATION_MINUTES: ${ENTUR_SUBSCRIBE_INITIAL_TERMINATION_MINUTES:-60}
      ENTUR_SUBSCRIBE_UPDATE_INTERVAL_SECONDS: ${ENTUR_SUBSCRIBE_UPDATE_INTERVAL_SECONDS:-0}
      ENTUR_SUBSCRIBE_AUTO_RENEW: ${ENTUR_SUBSCRIBE_AUTO_RENEW:-true}
      ENTUR_SUBSCRIBE_RENEW_BEFORE_MINUTES: ${ENTUR_SUBSCRIBE_RENEW_BEFORE_MINUTES:-5}
      ENTUR_SUBSCRIBE_DATASET_ID: ${ENTUR_SUBSCRIBE_DATASET_ID:-}
      API_KEYS: ${API_KEYS:-}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-ume1}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PATH_STYLE: ${S3_PATH_STYLE:-true}
      HEALTH_ADDR: ${HEALTH_ADDR:-:8080}
