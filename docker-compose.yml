services:
  ti1s3:
    build: .
    container_name: ti1s3
    restart: unless-stopped
    ports:
      - "${HEALTH_PORT:-8080}:8080"
    environment:
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-20}
      RETENTION_HOURS: ${RETENTION_HOURS:-168}
      ENTUR_REQUESTOR_ID: ${ENTUR_REQUESTOR_ID:-}
      ENTUR_BASE_URL: ${ENTUR_BASE_URL:-https://api.entur.io/realtime/v1/rest/et}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-ume1}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PATH_STYLE: ${S3_PATH_STYLE:-true}
      HEALTH_ADDR: ${HEALTH_ADDR:-:8080}
